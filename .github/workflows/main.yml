name: JHipster CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 8 (Matches your pom.xml version)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: Set up Node.js on the runner environment directly
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '6.11.0'

      # Step 4: Install global build tools so "rimraf" and "webpack" are always found globally
      - name: Pre-install global tools
        run: |
          npm install -g rimraf webpack@2.5.0
          echo "$(npm bin -g)" >> $GITHUB_PATH

      # Step 5: Grant execute permission to the Maven wrapper
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      # Step 6: Run full verification build
      - name: Build with Maven (Dev)
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          PHANTOMJS_CDNURL: "https://npmmirror.com/mirrors/phantomjs/"
          OPENSSL_CONF: "/dev/null"
        run: ./mvnw -B clean verify

      # Step 7: Package for Production
      - name: Package Production WAR
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          PHANTOMJS_CDNURL: "https://npmmirror.com/mirrors/phantomjs/"
          OPENSSL_CONF: "/dev/null"
        run: ./mvnw -B package -Pprod -DskipTests

      # Step 8: Upload the built WAR archive
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: great-big-example-app-prod
          path: target/*.war

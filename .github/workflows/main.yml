name: JHipster CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 8 (Matches your pom.xml version)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches your ~/.m2 dependencies

      # Step 3: Set up Node.js (Speeds up frontend compilation)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '6.11.0' # Matches your pom.xml property
          cache: 'yarn' # Automatically caches yarn dependencies based on yarn.lock

      # Step 4: Grant execute permission to the Maven wrapper
      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      # Step 5: Run the full verification build (Dev Profile)
      # This runs Java unit tests and verifies your basic build configuration
      - name: Build with Maven (Dev)
        run: ./mvnw -ntp clean verify

      # Step 6: Package for Production (Optional but recommended)
      # This compiles optimized frontend assets via webpack and builds the final WAR file
      - name: Package Production WAR
        run: ./mvnw -ntp package -Pprod -DskipTests

      # Step 7: Upload the built WAR archive
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: great-big-example-app-prod
          path: target/*.war